<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            padding: 20px;
        }
        .skill {
            margin: 20px 0;
        }
        .progress {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar {
            height: 30px;
            background-color: #76c7c0;
            text-align: center;
            line-height: 30px;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Skills</h1>
    <div class="skill">
        <h2>HTML</h2>
        <div class="progress">
            <div class="progress-bar" style="width: 90%;">90%</div>
        </div>
    </div>
    <div class="skill">
        <h2>CSS</h2>
        <div class="progress">
            <div class="progress-bar" style="width: 85%;">85%</div>
        </div>
    </div>
    <div class="skill">
        <h2>JavaScript</h2>
        <div class="progress">
            <div class="progress-bar" style="width: 80%;">80%</div>
        </div>
    </div>
    <div class="skill">
        <h2>Python</h2>
        <div class="progress">
            <div class="progress-bar" style="width: 75%;">75%</div>
        </div>
    </div>
    <div class="skill">
        <h2>Java</h2>
        <div class="progress">
            <div class="progress-bar" style="width: 70%;">70%</div>
        </div>
    </div>
</body>
</html>
