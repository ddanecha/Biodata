<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <link rel="stylesheet" href="todo-styles.css">\n    <title>To-Do List</title>\n</head>\n<body>\n    <div class="todo-app">\n        <h1>To-Do List</h1>\n        <input type="text" id="task-input" placeholder="Add a new task">\n        <button id="add-task">Add</button>\n        <div class="filter-buttons">\n            <button id="filter-all">All</button>\n            <button id="filter-active">Active</button>\n            <button id="filter-completed">Completed</button>\n        </div>\n        <ul id="task-list"></ul>\n        <div class="statistics">\n            <p>Total Tasks: <span id="total-tasks">0</span></p>\n            <p>Completed Tasks: <span id="completed-tasks">0</span></p>\n        </div>\n        <button id="clear-completed">Clear Completed</button>\n    </div>\n    <script src="todo-script.js"></script>\n</body>\n</html>
